# ============================================================
# Prefix
# ============================================================
set -g prefix C-f
unbind C-b
bind C-f send-prefix

# ============================================================
# General
# ============================================================
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g escape-time 0              # No delay for escape key
set -g history-limit 50000        # Scrollback buffer
set -g display-time 2000          # Message display duration
set -g focus-events on            # Focus events for vim/editor
set -g base-index 1               # Windows start at 1
setw -g pane-base-index 1         # Panes start at 1
set -g renumber-windows on        # Renumber after close
set -g set-clipboard on           # OSC 52 clipboard
setw -g mode-keys vi              # vi mode in copy mode

# ============================================================
# Mouse
# ============================================================
set -g mouse on

# ============================================================
# Pane Navigation (vim-style)
# ============================================================
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# Pane resize (vim-style with Shift)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ============================================================
# Window & Pane Management
# ============================================================
# Split panes (intuitive keys)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Quick window switching
bind -r C-h previous-window
bind -r C-l next-window

# Swap windows
bind -r < swap-window -t -1\; previous-window
bind -r > swap-window -t +1\; next-window

# Pane zoom toggle (already default: prefix z)

# ============================================================
# Copy Mode (macOS clipboard integration)
# ============================================================
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"

# ============================================================
# Session Management
# ============================================================
bind S command-prompt -p "New session:" "new-session -s '%%'"
bind s choose-tree -sZ         # Session switcher
bind X confirm-before -p "Kill session? (y/n)" kill-session

# ============================================================
# Reload config
# ============================================================
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# ============================================================
# Status Bar (Nord-inspired)
# ============================================================
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#3b4252,fg=#d8dee9"

# Left: session name
set -g status-left-length 30
set -g status-left "#[bg=#5e81ac,fg=#eceff4,bold] #S #[bg=#3b4252] "

# Right: date/time
set -g status-right-length 50
set -g status-right "#[fg=#d8dee9] %m/%d %H:%M #[bg=#5e81ac,fg=#eceff4] #h "

# Window tabs
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[bg=#81a1c1,fg=#2e3440,bold] #I:#W "
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#4c566a"
set -g pane-active-border-style "fg=#81a1c1"

# ============================================================
# Plugins (TPM)
# ============================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'    # Session save/restore
set -g @plugin 'tmux-plugins/tmux-continuum'     # Auto save sessions
set -g @plugin 'sainnhe/tmux-fzf'

# tmux-resurrect settings
set -g @resurrect-capture-pane-contents 'on'

# tmux-continuum settings
set -g @continuum-restore 'on'        # Auto restore on tmux start
set -g @continuum-save-interval '15'  # Save every 15 min

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
